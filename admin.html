<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ResumeHopper Admin</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,sans-serif;background:#f5f5f5;padding:2rem 1rem;}
.card{background:white;border-radius:18px;padding:2rem;max-width:650px;margin:0 auto;box-shadow:0 2px 16px rgba(0,0,0,.07);}
h1{font-size:22px;font-weight:700;color:#6C63FF;margin-bottom:1.5rem;text-align:center;}
.login-box{text-align:center;}
input{width:100%;border:1.5px solid #e0e0e0;border-radius:10px;padding:11px 13px;font-size:14px;margin-bottom:12px;outline:none;}
input:focus{border-color:#6C63FF;}
.btn{background:#6C63FF;color:white;border:none;padding:13px;border-radius:10px;font-size:15px;font-weight:600;width:100%;cursor:pointer;}
.btn:hover{opacity:.9;}
.payment-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid #f0f0f0;font-size:13px;gap:8px;flex-wrap:wrap;}
.payment-row:last-child{border-bottom:none;}
.pid{font-family:monospace;font-weight:600;color:#6C63FF;font-size:13px;letter-spacing:1px;word-break:break-all;max-width:200px;}
.plan-badge{padding:3px 8px;border-radius:20px;font-size:11px;font-weight:700;}
.plan-lifetime{background:#f0f0ff;color:#534AB7;}
.plan-token{background:#f0fff4;color:#276749;}
.status-pending{background:#fffbe6;color:#856404;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;}
.status-verified{background:#f0fff4;color:#276749;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;}
.used-badge{background:#fff5f5;color:#C53030;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;}
.verify-btn{background:#22c55e;color:white;border:none;padding:7px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;}
.verify-btn:hover{opacity:.9;}
.refresh-btn{background:#f0f0ff;color:#6C63FF;border:none;padding:10px 20px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;margin-bottom:1.5rem;width:100%;}
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:1.5rem;}
.stat{background:#f9f9ff;border-radius:12px;padding:1rem;text-align:center;}
.stat-num{font-size:28px;font-weight:700;color:#6C63FF;}
.stat-label{font-size:12px;color:#888;margin-top:4px;}
</style>
</head>
<body>
<div class="card">
  <h1>🔐 ResumeHopper Admin</h1>
  <div id="loginBox" class="login-box">
    <p style="font-size:14px;color:#888;margin-bottom:1rem;">Enter admin password</p>
    <input type="password" id="passInput" placeholder="Admin password">
    <button class="btn" id="loginBtn">Login</button>
    <div id="loginErr" style="color:#c00;font-size:13px;margin-top:8px;"></div>
  </div>
  <div id="adminPanel" style="display:none;">
    <div class="stats">
      <div class="stat"><div class="stat-num" id="totalCount">0</div><div class="stat-label">Total</div></div>
      <div class="stat"><div class="stat-num" id="pendingCount">0</div><div class="stat-label">Pending</div></div>
      <div class="stat"><div class="stat-num" id="verifiedCount">0</div><div class="stat-label">Verified</div></div>
    </div>
    <button class="refresh-btn" onclick="loadPayments()">🔄 Refresh</button>
    <div id="paymentsList"></div>
  </div>
</div>
<script>
var adminPass = '';

document.addEventListener('DOMContentLoaded', function(){
  document.getElementById('loginBtn').addEventListener('click', login);
  document.getElementById('passInput').addEventListener('keydown', function(e){
    if(e.key === 'Enter') login();
  });
});

function login(){
  var pass = document.getElementById('passInput').value;
  if(!pass){ document.getElementById('loginErr').textContent = 'Enter password!'; return; }
  fetch('/api/admin_verify', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({action: 'login', password: pass})
  }).then(function(r){ return r.json(); }).then(function(d){
    if(d.ok){
      adminPass = pass;
      document.getElementById('loginBox').style.display = 'none';
      document.getElementById('adminPanel').style.display = 'block';
      loadPayments();
    } else {
      document.getElementById('loginErr').textContent = 'Wrong password!';
    }
  }).catch(function(){
    document.getElementById('loginErr').textContent = 'Network error. Try again.';
  });
}

function loadPayments(){
  fetch('/api/admin_verify', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({action: 'list', password: adminPass})
  }).then(function(r){ return r.json(); }).then(function(d){
    var payments = Array.isArray(d) ? d : (d.payments || []);
    document.getElementById('totalCount').textContent = payments.length;
    document.getElementById('pendingCount').textContent = payments.filter(function(p){ return p.status === 'pending'; }).length;
    document.getElementById('verifiedCount').textContent = payments.filter(function(p){ return p.status === 'verified'; }).length;

    if(!payments.length){
      document.getElementById('paymentsList').innerHTML = '<p style="text-align:center;color:#888;padding:2rem;">No payments yet.</p>';
      return;
    }

    var html = '';
    payments.forEach(function(p){
      var planClass = p.plan === 'lifetime' ? 'plan-lifetime' : 'plan-token';
      var planLabel = p.plan === 'lifetime' ? '💎 Lifetime' : '🎫 Token';
      var planBadge = '<span class="plan-badge ' + planClass + '">' + planLabel + '</span>';
      var usedBadge = (p.plan === 'token' && p.used) ? '<span class="used-badge">Used</span>' : '';
      var statusBadge = '<span class="status-' + (p.status === 'verified' ? 'verified' : 'pending') + '">' + p.status + '</span>';
      var verifyBtn = p.status !== 'verified'
        ? '<button class="verify-btn" data-token="' + p.token + '" onclick="approvePayment(this)">✅ Verify</button>'
        : '<span style="color:#276749;font-size:12px;">✓ Done</span>';
      html += '<div class="payment-row">'
        + '<span class="pid">' + p.token + '</span>'
        + planBadge
        + statusBadge
        + usedBadge
        + verifyBtn
        + '</div>';
    });
    document.getElementById('paymentsList').innerHTML = html;
  }).catch(function(){
    document.getElementById('paymentsList').innerHTML = '<p style="color:#c00;text-align:center;padding:1rem;">Error loading payments.</p>';
  });
}

function approvePayment(btn){
  var token = btn.getAttribute('data-token');
  btn.textContent = '⏳';
  btn.disabled = true;
  fetch('/api/admin_verify', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({action: 'verify', password: adminPass, token: token})
  }).then(function(r){ return r.json(); }).then(function(){
    loadPayments();
  }).catch(function(){
    btn.textContent = '✅ Verify';
    btn.disabled = false;
  });
}
</script>
</body>
</html>
