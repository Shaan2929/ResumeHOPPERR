<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ResumeHopper Admin</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,sans-serif;background:#f5f5f5;padding:2rem 1rem;}
.card{background:white;border-radius:18px;padding:2rem;max-width:600px;margin:0 auto;box-shadow:0 2px 16px rgba(0,0,0,.07);}
h1{font-size:22px;font-weight:700;color:#6C63FF;margin-bottom:1.5rem;text-align:center;}
.login-box{text-align:center;}
input{width:100%;border:1.5px solid #e0e0e0;border-radius:10px;padding:11px 13px;font-size:14px;margin-bottom:12px;outline:none;}
input:focus{border-color:#6C63FF;}
.btn{background:#6C63FF;color:white;border:none;padding:13px;border-radius:10px;font-size:15px;font-weight:600;width:100%;cursor:pointer;}
.btn:hover{opacity:.9;}
.payment-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid #f0f0f0;font-size:14px;}
.payment-row:last-child{border-bottom:none;}
.pid{font-family:monospace;font-weight:600;color:#6C63FF;font-size:15px;letter-spacing:1px;}
.status-pending{background:#fffbe6;color:#856404;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:600;}
.status-verified{background:#f0fff4;color:#276749;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:600;}
.verify-btn{background:#22c55e;color:white;border:none;padding:7px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;}
.verify-btn:hover{opacity:.9;}
.refresh-btn{background:#f0f0ff;color:#6C63FF;border:none;padding:10px 20px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;margin-bottom:1.5rem;width:100%;}
</style>
</head>
<body>
<div class="card">
  <h1>🔐 ResumeHopper Admin</h1>
  <div id="loginBox" class="login-box">
    <p style="font-size:14px;color:#888;margin-bottom:1rem;">Enter admin password to continue</p>
    <input type="password" id="passInput" placeholder="Admin password" onkeydown="if(event.key==='Enter')login()">
    <button class="btn" onclick="login()">Login</button>
    <div id="loginErr" style="color:#c00;font-size:13px;margin-top:8px;"></div>
  </div>
  <div id="adminPanel" style="display:none;">
    <button class="refresh-btn" onclick="loadPayments()">🔄 Refresh Payments</button>
    <div id="paymentsList"></div>
  </div>
</div>
<script>
var adminPass = '';
function login(){
  var pass = document.getElementById('passInput').value;
  fetch('/api/admin_verify',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'login',password:pass})})
  .then(function(r){return r.json();}).then(function(d){
    if(d.ok){ adminPass=pass; document.getElementById('loginBox').style.display='none'; document.getElementById('adminPanel').style.display='block'; loadPayments(); }
    else { document.getElementById('loginErr').textContent='Wrong password!'; }
  });
}
function loadPayments(){
  fetch('/api/admin_verify',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'list',password:adminPass})})
  .then(function(r){return r.json();}).then(function(d){
    if(!d.payments||d.payments.length===0){
      document.getElementById('paymentsList').innerHTML='<p style="text-align:center;color:#888;padding:2rem;">No payments yet.</p>';
      return;
    }
    var html='';
    function loadPayments(){
  fetch('/api/admin_verify',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'list',password:adminPass})})
  .then(function(r){return r.json();}).then(function(d){
    var payments = Array.isArray(d) ? d : (d.payments || []);
    if(!payments.length){
      document.getElementById('paymentsList').innerHTML='<p style="text-align:center;color:#888;padding:2rem;">No payments yet.</p>';
      return;
    }
    var html='';
    payments.forEach(function(p){
      html+='<div class="payment-row"><span class="pid">'+p.payment_id+'</span><span class="status-'+(p.status==='verified'?'verified':'pending')+'">'+p.status+'</span>'+(p.status!=='verified'?'<button class="verify-btn" onclick="approvePayment(\''+p.payment_id+'\')">✅ Verify</button>':'<span style="color:#276749;font-size:13px;">✓ Done</span>')+'</div>';
    });
    document.getElementById('paymentsList').innerHTML=html;
  });
}
      html+='<div class="payment-row"><span class="pid">'+p.payment_id+'</span><span class="status-'+(p.status==='verified'?'verified':'pending')+'">'+p.status+'</span>'+(p.status!=='verified'?'<button class="verify-btn" onclick="approvePayment(\'' + p.payment_id + '\')">✅ Verify</button>':'<span style="color:#276749;font-size:13px;">✓ Done</span>')+'</div>';
    });
    document.getElementById('paymentsList').innerHTML=html;
  });
}
function approvePayment(pid){
  fetch('/api/admin_verify',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'verify',password:adminPass,payment_id:pid})})
  .then(function(r){return r.json();}).then(function(){loadPayments();});
}
</script>
</body>
</html>
